<?xml version="1.0" encoding="UTF-8"?>
<!--
  Apexlytics — Play Store Feature Graphic v1 (Hero/Centered)
  Canvas: 1024 × 500  (required dimensions)
  Colors: Dark navy gradient · Orange #FF4500 · White #FFFFFF

  Layout:
    Left  (~0–480):  Hexagon + Triangle logo with decorative hex rings
    Right (~500–990): App name, tagline, feature pills
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500"
     role="img" aria-label="Apexlytics — Play Store feature graphic">
  <defs>
    <!-- Main background gradient (dark navy top-left → slightly lighter bottom-right) -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0D0D1A"/>
      <stop offset="55%"  stop-color="#141428"/>
      <stop offset="100%" stop-color="#1A1A2E"/>
    </linearGradient>

    <!-- Radial glow behind the logo -->
    <radialGradient id="logo-glow" cx="25%" cy="50%" r="42%">
      <stop offset="0%"   stop-color="#FF4500" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0D0D1A" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft vignette on the right edge -->
    <linearGradient id="vignette" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="55%"  stop-color="#0D0D1A" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D0D1A" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Orange gradient for triangle + nodes (matches icon exactly) -->
    <linearGradient id="orange1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FF2200"/>
    </linearGradient>

    <!-- Glow filter (matches icon, blur scales with transform) -->
    <filter id="glow1">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────────── -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#logo-glow)"/>
  <rect width="1024" height="500" fill="url(#vignette)"/>

  <!-- ── Decorative rings around logo ────────────────────────────────────── -->
  <circle cx="248" cy="250" r="120" fill="none" stroke="#FF4500" stroke-width="1"   opacity="0.14"/>
  <circle cx="248" cy="250" r="145" fill="none" stroke="#FF4500" stroke-width="0.6" opacity="0.08"/>
  <circle cx="248" cy="250" r="170" fill="none" stroke="#FF4500" stroke-width="0.5" opacity="0.05"/>

  <!--
    ── Logo: exact icon_1024.svg geometry, scaled to 22% and centered at (248, 250)
       transform = translate(248 - 512×0.22, 250 - 512×0.22) scale(0.22)
                 = translate(135.36, 137.36) scale(0.22)
  -->
  <g transform="translate(135.36, 137.36) scale(0.22)">

    <!-- Outer hex ring -->
    <polygon points="512,80 860,272 860,752 512,944 164,752 164,272"
      fill="none" stroke="#FF4500" stroke-width="18" stroke-opacity="0.25"/>

    <!-- Inner hex -->
    <polygon points="512,200 776,344 776,680 512,824 248,680 248,344"
      fill="none" stroke="#FF4500" stroke-width="6" stroke-opacity="0.15"/>

    <!-- Connecting spokes -->
    <line x1="512" y1="80"  x2="512" y2="200" stroke="#FF4500" stroke-width="6" stroke-opacity="0.4"/>
    <line x1="860" y1="272" x2="776" y2="344" stroke="#FF4500" stroke-width="6" stroke-opacity="0.4"/>
    <line x1="860" y1="752" x2="776" y2="680" stroke="#FF4500" stroke-width="6" stroke-opacity="0.4"/>
    <line x1="512" y1="944" x2="512" y2="824" stroke="#FF4500" stroke-width="6" stroke-opacity="0.4"/>
    <line x1="164" y1="752" x2="248" y2="680" stroke="#FF4500" stroke-width="6" stroke-opacity="0.4"/>
    <line x1="164" y1="272" x2="248" y2="344" stroke="#FF4500" stroke-width="6" stroke-opacity="0.4"/>

    <!-- Center triangle -->
    <polygon points="512,290 690,590 334,590"
      fill="none" stroke="url(#orange1)" stroke-width="28" stroke-linejoin="round"
      filter="url(#glow1)"/>

    <!-- Inner triangle fill -->
    <polygon points="512,340 655,570 369,570" fill="#FF4500" fill-opacity="0.12"/>

    <!-- Center dot -->
    <circle cx="512" cy="480" r="36" fill="url(#orange1)" filter="url(#glow1)"/>
    <circle cx="512" cy="480" r="18" fill="#FFFFFF" fill-opacity="0.9"/>

    <!-- Triangle corner nodes -->
    <circle cx="512" cy="290" r="14" fill="url(#orange1)" filter="url(#glow1)"/>
    <circle cx="690" cy="590" r="14" fill="url(#orange1)" filter="url(#glow1)"/>
    <circle cx="334" cy="590" r="14" fill="url(#orange1)" filter="url(#glow1)"/>

    <!-- Outer hex vertex nodes -->
    <circle cx="512" cy="80"  r="10" fill="#FF4500" fill-opacity="0.7"/>
    <circle cx="860" cy="272" r="10" fill="#FF4500" fill-opacity="0.7"/>
    <circle cx="860" cy="752" r="10" fill="#FF4500" fill-opacity="0.7"/>
    <circle cx="512" cy="944" r="10" fill="#FF4500" fill-opacity="0.7"/>
    <circle cx="164" cy="272" r="10" fill="#FF4500" fill-opacity="0.7"/>
    <circle cx="164" cy="752" r="10" fill="#FF4500" fill-opacity="0.7"/>

  </g>

  <!-- ── Subtle vertical orange divider ───────────────────────────────────── -->
  <line x1="490" y1="60" x2="490" y2="440"
        stroke="#FF4500" stroke-width="0.8" opacity="0.20"/>

  <!-- ════════════════════════════════════════════════════════════════════ -->
  <!-- TEXT BLOCK — right section                                           -->
  <!-- ════════════════════════════════════════════════════════════════════ -->

  <!-- App name -->
  <text x="525" y="175"
        font-family="'Noto Sans', 'Trebuchet MS', Arial, sans-serif"
        font-size="74" font-weight="900" letter-spacing="0"
        fill="#FFFFFF">APEXLYTICS</text>

  <!-- Orange rule under title -->
  <rect x="525" y="192" width="280" height="2.5" rx="1" fill="#FF4500" opacity="0.90"/>

  <!-- Tagline line 1 -->
  <text x="525" y="245"
        font-family="'Open Sans', 'Trebuchet MS', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="300" letter-spacing="0.3"
        fill="#FFFFFF">Track your ranked grind.</text>

  <!-- Tagline line 2 -->
  <text x="525" y="280"
        font-family="'Open Sans', 'Trebuchet MS', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="300" letter-spacing="0.3"
        fill="#FF4500">Get map alerts.</text>

  <!-- Feature pills -->
  <!-- Map Rotations pill -->
  <rect x="525" y="320" width="135" height="32" rx="16"
        fill="none" stroke="#FF4500" stroke-width="1.3"/>
  <text x="592" y="342"
        font-family="'Open Sans', Arial, sans-serif"
        font-size="13" font-weight="500" fill="#FF4500" text-anchor="middle">MAP ROTATIONS</text>

  <!-- RP Tracking pill -->
  <rect x="670" y="320" width="120" height="32" rx="16"
        fill="none" stroke="#FF4500" stroke-width="1.3"/>
  <text x="730" y="342"
        font-family="'Open Sans', Arial, sans-serif"
        font-size="13" font-weight="500" fill="#FF4500" text-anchor="middle">RP TRACKING</text>

  <!-- Player Stats pill -->
  <rect x="800" y="320" width="130" height="32" rx="16"
        fill="none" stroke="#FF4500" stroke-width="1.3"/>
  <text x="865" y="342"
        font-family="'Open Sans', Arial, sans-serif"
        font-size="13" font-weight="500" fill="#FF4500" text-anchor="middle">PLAYER STATS</text>
</svg>
