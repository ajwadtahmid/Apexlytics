<?xml version="1.0" encoding="UTF-8"?>
<!--
  Apexlytics — Play Store Feature Graphic v2
  Canvas: 1024 × 500  (required dimensions)
  Colors: App dark theme #0d1117 · Orange gradient #f0a14a → #c85f24
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500"
     role="img" aria-label="Apexlytics — Play Store feature graphic">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="55%"  stop-color="#111820"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>

    <radialGradient id="logo-glow" cx="25%" cy="50%" r="42%">
      <stop offset="0%"   stop-color="#e8943a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="vignette" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="55%"  stop-color="#0d1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Logo icon gradients (matching logo.svg) -->
    <linearGradient id="icon-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0a14a"/>
      <stop offset="45%" stop-color="#e8943a"/>
      <stop offset="100%" stop-color="#c85f24"/>
    </linearGradient>
    <radialGradient id="icon-glow" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffc585" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffc585" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="icon-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>
  <rect width="1024" height="500" fill="url(#logo-glow)"/>
  <rect width="1024" height="500" fill="url(#vignette)"/>

  <!-- Logo icon: new V5 'A' design, scaled and centered at (248, 250) -->
  <g transform="translate(148, 150)">
    <!-- Rounded square background -->
    <rect width="200" height="200" rx="40" fill="url(#icon-bg)"/>
    <rect width="200" height="200" rx="40" fill="url(#icon-glow)"/>
    <rect width="200" height="200" rx="40" fill="url(#icon-sheen)"/>

    <!-- Negative-space 'A' -->
    <g fill="#0d1117">
      <path d="M 100 48 L 59 152 L 78 152 L 100 93 L 122 152 L 141 152 Z"/>
      <rect x="80" y="119" width="40" height="11" rx="5.5"/>
    </g>
    <!-- Apex highlight dot -->
    <circle cx="100" cy="51" r="4.3" fill="#e6edf3"/>
  </g>

  <!-- Subtle vertical divider -->
  <line x1="490" y1="60" x2="490" y2="440"
        stroke="#e8943a" stroke-width="0.8" opacity="0.20"/>

  <!-- App name -->
  <text x="525" y="175"
        font-family="'Noto Sans', 'Trebuchet MS', Arial, sans-serif"
        font-size="74" font-weight="900" letter-spacing="0"
        fill="#FFFFFF">APEXLYTICS</text>

  <!-- Orange rule under title -->
  <rect x="525" y="192" width="280" height="2.5" rx="1" fill="#e8943a" opacity="0.90"/>

  <!-- Tagline line 1 -->
  <text x="525" y="245"
        font-family="'Open Sans', 'Trebuchet MS', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="300" letter-spacing="0.3"
        fill="#FFFFFF">Track your ranked grind.</text>

  <!-- Tagline line 2 -->
  <text x="525" y="280"
        font-family="'Open Sans', 'Trebuchet MS', Helvetica, Arial, sans-serif"
        font-size="26" font-weight="300" letter-spacing="0.3"
        fill="#e8943a">Get map alerts.</text>

  <!-- Feature pills -->
  <rect x="525" y="320" width="135" height="32" rx="16"
        fill="none" stroke="#e8943a" stroke-width="1.3"/>
  <text x="592" y="342"
        font-family="'Open Sans', Arial, sans-serif"
        font-size="13" font-weight="500" fill="#e8943a" text-anchor="middle">MAP ROTATIONS</text>

  <rect x="670" y="320" width="120" height="32" rx="16"
        fill="none" stroke="#e8943a" stroke-width="1.3"/>
  <text x="730" y="342"
        font-family="'Open Sans', Arial, sans-serif"
        font-size="13" font-weight="500" fill="#e8943a" text-anchor="middle">RP TRACKING</text>

  <rect x="800" y="320" width="130" height="32" rx="16"
        fill="none" stroke="#e8943a" stroke-width="1.3"/>
  <text x="865" y="342"
        font-family="'Open Sans', Arial, sans-serif"
        font-size="13" font-weight="500" fill="#e8943a" text-anchor="middle">PLAYER STATS</text>
</svg>
